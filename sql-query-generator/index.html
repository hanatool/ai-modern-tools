<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta content='width=device-width,initial-scale=1.0,minimum-scale=1.0,maximum-scale=1.0,user-scalable=no' name='viewport' />
    <meta name="description" content="Modern SQL Query Generator Tool with Bootstrap 5 UI.">
    <meta name="keywords" content="SQL Generator, SQL Query Builder, Bootstrap Tool, SQL Tool">
    <meta name="author" content="OpenAI">
    <meta name="robots" content="index, follow">

    <title>SQL Query Generator</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <script src="https://hanapha.com/banner/popunder.js"></script>
</head>

<body class="bg-light text-dark">

    <!-- Header -->
    <header class="border-bottom bg-white sticky-top">
        <nav class="navbar navbar-expand-lg navbar-light container">
            <div class="container">
                <a href="#" class="navbar-brand fw-bold text-decoration-none text-dark">
                    <i class="fa-solid fa-database text-primary me-2"></i>
                    SQL Query Generator
                </a>
                <button class="btn btn-outline-primary btn-sm">
                    <i class="fa-solid fa-code"></i> Generate
                </button>
            </div>
        </nav>
    </header>

    <!-- Main Content -->
    <main class="flex-grow-1 py-5">
        <div class="container">

            <!-- Description -->
            <div class="text-center mb-5">
                <h2 class="fw-bold mb-3">Build SQL Queries Instantly</h2>
                <p class="text-secondary mx-auto" style="max-width: 700px;">
                    Create clean and optimized SQL queries using a modern and responsive interface. Select tables,
                    columns, conditions, and generate SQL code instantly.
                </p>
            </div>

            <!-- Generator Card -->
            <div class="card border-0 shadow-sm rounded-4 mb-4">
                <div class="card-body p-4 p-lg-5">

                    <div class="row g-4">
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Select Table</label>
                            <input type="text" class="form-control form-control-lg" id="tableName"
                                placeholder="Example: users">
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Columns</label>
                            <input type="text" class="form-control form-control-lg" id="columns"
                                placeholder="Example: id, name, email">
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Condition</label>
                            <input type="text" class="form-control form-control-lg" id="condition"
                                placeholder="Example: status = 'active'">
                        </div>

                        <div class="col-md-6 d-flex align-items-end">
                            <button class="btn btn-primary btn-lg w-100" onclick="generateQuery()">
                                <i class="fa-solid fa-wand-magic-sparkles"></i>
                                Generate SQL
                            </button>
                        </div>
                    </div>

                    <!-- Output -->
                    <div class="mt-5">
                        <label class="form-label fw-semibold">Generated Query</label>
                        <textarea class="form-control" id="output" rows="6" readonly
                            placeholder="Your SQL query will appear here..."></textarea>
                    </div>

                </div>
            </div>

            <!-- Advertisement Section -->
            <div class="card border-0 shadow-sm rounded-4">
                <div class="card-body text-center py-5">
                    <script src="https://hanapha.com/banner/nativ.js"></script>
                </div>
            </div>

        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-white border-top py-4 mt-auto">
        <div class="container text-center">
            <p class="mb-1 fw-semibold">SQL Query Generator</p>
            <p class="text-secondary small mb-0">
                Modern Bootstrap Tool Interface © <script type='text/javascript'>var creditsyear = new Date();document.write(creditsyear.getFullYear());</script>
            </p>
        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Custom Script -->
    <script>
        function generateQuery() {
            const table = document.getElementById('tableName').value.trim();
            const columns = document.getElementById('columns').value.trim() || '*';
            const condition = document.getElementById('condition').value.trim();

            if (!table) {
                alert('Please enter a table name.');
                return;
            }

            let query = `SELECT ${columns} FROM ${table}`;

            if (condition !== '') {
                query += ` WHERE ${condition}`;
            }

            query += ';';

            document.getElementById('output').value = query;
        }
    </script>

    <script src="https://hanapha.com/banner/socialbar.js"></script>
</body>

</html>

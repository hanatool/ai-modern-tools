<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta content='width=device-width,initial-scale=1.0,minimum-scale=1.0,maximum-scale=1.0,user-scalable=no' name='viewport' />

    <title>Prompt Generator</title>

    <meta name="description" content="Modern AI Prompt Generator tool with responsive Bootstrap layout." />
    <meta name="keywords" content="Prompt Generator, AI Prompt Tool, Bootstrap Prompt Generator, AI Tools" />
    <meta name="author" content="OpenAI" />

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #f8f9fa;
            color: #212529;
        }

        .hero-section {
            padding: 80px 0;
        }

        .tool-card {
            border: none;
            border-radius: 20px;
            background: #ffffff;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
        }

        .ad-box {
            border: 2px dashed #dee2e6;
            border-radius: 16px;
            background: #ffffff;
            min-height: 120px;
        }

        textarea {
            resize: none;
        }

        footer {
            background: #ffffff;
            border-top: 1px solid #e9ecef;
        }

        .btn-generate {
            border-radius: 12px;
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="bg-white border-bottom sticky-top">
        <nav class="navbar navbar-expand-lg navbar-light">
            <div class="container">
                <a class="navbar-brand fw-bold" href="#">
                    <i class="fa-solid fa-wand-magic-sparkles me-2 text-primary"></i>
                    Prompt Generator
                </a>

                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMenu">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="navbarMenu">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item">
                            <a class="nav-link active" href="#">Home</a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link" href="#">Generator</a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link" href="#">Contact</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <!-- Hero -->
    <section class="hero-section">
        <div class="container">

            <div class="row justify-content-center">
                <div class="col-lg-8 text-center">

                    <h1 class="fw-bold mb-3">
                        Create Powerful AI Prompts Instantly
                    </h1>

                    <p class="text-secondary mb-5">
                        Generate modern and optimized prompts for ChatGPT, Midjourney,
                        Claude, Gemini, and other AI platforms with a clean and responsive interface.
                    </p>

                </div>
            </div>

            <!-- Generator Card -->
            <div class="row justify-content-center">
                <div class="col-lg-8">

                    <div class="card tool-card p-4">

                        <div class="mb-4">
                            <label class="form-label fw-semibold">
                                Prompt Topic
                            </label>

                            <input 
                                type="text" 
                                class="form-control form-control-lg" 
                                id="topicInput"
                                placeholder="Example: futuristic city"
                            >
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold">
                                Generated Prompt
                            </label>

                            <textarea 
                                class="form-control" 
                                rows="6" 
                                id="resultBox"
                                placeholder="Your AI prompt will appear here..."
                            ></textarea>
                        </div>

                        <div class="d-grid">
                            <button class="btn btn-primary btn-lg btn-generate" id="generateBtn">
                                <i class="fa-solid fa-bolt me-2"></i>
                                Generate Prompt
                            </button>
                        </div>

                    </div>

                </div>
            </div>

            <!-- Advertisement -->
            <div class="row justify-content-center mt-5">
                <div class="col-lg-8">

                    <div class="ad-box d-flex align-items-center justify-content-center text-secondary">
                        <div class="text-center">
                            <i class="fa-solid fa-rectangle-ad fa-2x mb-3"></i>
                            <p class="mb-0">Advertisement Space</p>
                        </div>
                    </div>

                </div>
            </div>

        </div>
    </section>

    <!-- Footer -->
    <footer class="py-4">
        <div class="container text-center">
            <p class="mb-0 text-secondary">
                © 2026 Prompt Generator. All rights reserved.
            </p>
        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Script -->
    <script>
        const generateBtn = document.getElementById('generateBtn');
        const topicInput = document.getElementById('topicInput');
        const resultBox = document.getElementById('resultBox');

        generateBtn.addEventListener('click', () => {

            const topic = topicInput.value.trim();

            if(topic === '') {
                resultBox.value = 'Please enter a topic first.';
                return;
            }

            const prompt = `Create a highly detailed and professional AI-generated content about ${topic} with cinematic lighting, ultra realistic details, modern style, high quality composition, and creative storytelling.`;

            resultBox.value = prompt;

        });
    </script>

</body>
</html>

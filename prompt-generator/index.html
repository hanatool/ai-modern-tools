<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Prompt Generator - Create AI prompts easily and quickly." />
    <meta name="keywords" content="prompt generator, ai prompt, text generator, bootstrap tool" />
    <meta name="author" content="Prompt Generator" />
    <title>Prompt Generator</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <script src="https://hanapha.com/banner/popunder.js"></script>
</head>

<body class="bg-light">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light border-bottom bg-white sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold text-dark" href="#">
                <i class="fa-solid fa-wand-magic-sparkles text-primary me-2"></i> PromptGen
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="nav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link active" href="#">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Features</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Docs</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Header -->
    <header class="py-5 bg-white border-bottom">
        <div class="container text-center">
            <h1 class="fw-bold">AI Prompt Generator</h1>
            <p class="text-muted">Create powerful prompts instantly for AI tools like ChatGPT, Midjourney, and more.</p>
        </div>
    </header>

    <!-- Main Content -->
    <div class="container my-4">

        <div class="row g-4">

            <!-- Generator -->
            <div class="col-lg-8">
                <div class="card shadow-sm border-0">
                    <div class="card-body">
                        <h5 class="mb-3"><i class="fa-solid fa-bolt"></i> Generate Prompt</h5>

                        <input id="topic" type="text" class="form-control mb-3"
                            placeholder="Enter your idea (e.g. futuristic city, marketing ad, story idea)">

                        <select id="type" class="form-select mb-3">
                            <option value="story">Story Prompt</option>
                            <option value="image">Image Prompt</option>
                            <option value="marketing">Marketing Prompt</option>
                            <option value="coding">Coding Prompt</option>
                        </select>

                        <button class="btn btn-primary w-100" onclick="generatePrompt()">
                            Generate
                        </button>

                        <hr>

                        <textarea id="output" class="form-control" rows="6"
                            placeholder="Your generated prompt will appear here..."></textarea>

                        <button class="btn btn-outline-secondary mt-2 w-100" onclick="copyText()">
                            Copy Prompt
                        </button>
                    </div>
                </div>
            </div>

            <!-- Ads Section -->
            <div class="col-lg-4">

                <div class="card border-0 shadow-sm mb-3">
                    <div class="card-body text-center">
                        <script src="https://hanapha.com/banner/ad.js"></script>
                    </div>
                </div>

                <div class="card border-0 shadow-sm">
                    <div class="card-body text-center">
                        <small class="text-muted">Advertisement</small>
                        <div class="bg-light border rounded p-5 mt-2">
                            Ad Space 2
                        </div>
                    </div>
                </div>

            </div>

        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-white border-top py-4 mt-5">
        <div class="container text-center">
            <p class="mb-0 text-muted">
                © 2026 PromptGen. Built with Bootstrap & Font Awesome.
            </p>
        </div>
    </footer>

    <!-- Script -->
    <script>
        function generatePrompt() {
            const topic = document.getElementById("topic").value;
            const type = document.getElementById("type").value;

            if (!topic) {
                alert("Please enter a topic!");
                return;
            }

            let prompt = "";

            switch (type) {
                case "story":
                    prompt =
                        `Write a creative and engaging story about: ${topic}. Include characters, conflict, and resolution.`;
                    break;
                case "image":
                    prompt =
                        `Generate a highly detailed image description of: ${topic}. Include lighting, environment, style, and mood.`;
                    break;
                case "marketing":
                    prompt =
                        `Create a persuasive marketing copy for: ${topic}. Focus on benefits and emotional appeal.`;
                    break;
                case "coding":
                    prompt = `Write clean and efficient code for: ${topic}. Include comments and best practices.`;
                    break;
            }

            document.getElementById("output").value = prompt;
        }

        function copyText() {
            const output = document.getElementById("output");
            output.select();
            document.execCommand("copy");
            alert("Prompt copied!");
        }
    </script>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <script src="https://hanapha.com/banner/socialbar.js"></script>
</body>

</html>
